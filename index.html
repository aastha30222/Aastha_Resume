<!DOCTYPE html>
<html>
<head>
  <title>Aastha Mishra</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f7f9fc;
      padding: 40px;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 40px;
      max-width: 900px;
      margin: auto;
    }

    .avatar {
      font-size: 90px;
      background: white;
      padding: 20px;
      border-radius: 50%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .content h1 {
      margin-bottom: 5px;
    }

    .content p {
      color: #555;
      margin-bottom: 20px;
    }

    .timeline {
      position: relative;
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .progress-line {
      position: absolute;
      top: 50%;
      left: 0;
      height: 4px;
      width: 0%;
      background: #4285f4;
      transition: width 0.5s ease;
      z-index: 0;
    }

    .step {
      position: relative;
      padding: 10px 15px;
      background: #e8f0fe;
      border-radius: 20px;
      cursor: pointer;
      z-index: 1;
      transition: 0.3s;
    }

    .step:hover {
      background: #4285f4;
      color: white;
    }

    .description {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      animation: fadeIn 0.4s ease;
    }

    .metrics {
      margin-top: 10px;
      font-weight: bold;
      color: #4285f4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

</head>

<body>

<div class="container">

  <!-- Avatar -->
  <div class="avatar">👩‍🎓</div>

  <!-- Content -->
  <div class="content">
    <h1>Aastha Mishra</h1>
    <p>Industrial Engineer | AI-Driven Operations</p>

    <div class="timeline">
      <div class="progress-line" id="progress"></div>

      <div class="step" onclick="showStage(0)">🎓 Start</div>
      <div class="step" onclick="showStage(1)">⚙️ Growth</div>
      <div class="step" onclick="showStage(2)">📈 Impact</div>
      <div class="step" onclick="showStage(3)">🤖 AI</div>
    </div>

    <div id="desc" class="description">
      Click a stage to explore the journey.
    </div>
  </div>

</div>

<script>
const stages = [
  {
    text: "Built a strong foundation in industrial engineering and process thinking.",
    metric: ""
  },
  {
    text: "Started optimizing workflows and improving operational efficiency across operations.",
    metric: ""
  },
  {
    text: "Led process improvements delivering measurable cost savings and throughput gains.",
    metric: "+42 cases/hour | $36K/month saved"
  },
  {
    text: "Currently building AI-driven solutions to scale operations and enable smarter decision-making.",
    metric: "AI + Data-driven optimization"
  }
];

function showStage(index) {
  const desc = document.getElementById("desc");
  const progress = document.getElementById("progress");

  desc.innerHTML = stages[index].text +
    (stages[index].metric ? `<div class="metrics">${stages[index].metric}</div>` : "");

  progress.style.width = ((index + 1) / stages.length) * 100 + "%";
}
</script>

</body>
</html>
