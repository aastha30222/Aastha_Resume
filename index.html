<!DOCTYPE html>
<html>
<head>
  <title>Aastha Mishra | Portfolio</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f7f9fc;
      padding: 30px;
      margin: 0;
    }

    .container {
      max-width: 950px;
      margin: auto;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 25px;
      margin-bottom: 30px;
    }

    .avatar {
      font-size: 80px;
      background: white;
      padding: 20px;
      border-radius: 50%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
    }

    .subtitle {
      color: #555;
    }

    /* NAV BUTTONS */
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .nav-btn {
      padding: 8px 14px;
      background: #e8f0fe;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }

    .nav-btn:hover {
      background: #4285f4;
      color: white;
    }

    /* CARD */
    .box {
      background: white;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      animation: fadeIn 0.3s ease;
      margin-bottom: 30px;
    }

    /* TOOLBOX TAGS */
    .tag {
      display: inline-block;
      background: #f1f3f4;
      padding: 6px 10px;
      margin: 5px;
      border-radius: 15px;
      font-size: 13px;
      transition: 0.3s;
    }

    .tag:hover {
      background: #4285f4;
      color: white;
    }

    ul {
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(5px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">👩‍🎓</div>
    <div>
      <h1>Aastha Mishra</h1>
      <p class="subtitle">Industrial Engineer | AI-Driven Operations | Systems Thinker</p>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="nav-btn" onclick="showSection('about')">About Me</div>
    <div class="nav-btn" onclick="showSection('toolbox')">My Toolbox</div>
    <div class="nav-btn" onclick="showSection('thinking')">How I Solve Problems</div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

</div>

<script>

const sections = {

  about: `
    <div class="box">
      <h2>About Me</h2>
      <p>
        Accomplished Industrial Engineer with 5+ years of experience driving operational efficiency and optimizing supply chain processes.
        I focus on process improvement, resource optimization, and cost-effective, scalable solutions.
      </p>

      <p>
        My approach is rooted in continuous improvement methodologies such as Kaizen, 5S, DMAIC, Root Cause Analysis, and data-driven decision making.
        I actively leverage AI tools and emerging technologies to enhance safety, quality, and performance.
      </p>

      <p>
        This web application reflects how I work—taking an idea, structuring it into requirements, building it step-by-step, and using AI-assisted development
        to create and refine a live, functional product.
      </p>
    </div>
  `,

  toolbox: `
    <div class="box">
      <h2>🧰 My Toolbox</h2>

      <p><b>Process Improvement & Lean</b></p>
      <span class="tag">Time Study</span>
      <span class="tag">Six Sigma</span>
      <span class="tag">Kaizen</span>
      <span class="tag">DMAIC</span>
      <span class="tag">FIFO</span>
      <span class="tag">5S</span>
      <span class="tag">RCA</span>
      <span class="tag">VSM</span>
      <span class="tag">5 Whys</span>

      <p><b>Systems</b></p>
      <span class="tag">SAP</span>
      <span class="tag">WMS</span>
      <span class="tag">TMS</span>

      <p><b>Data & Analytics</b></p>
      <span class="tag">Power BI</span>
      <span class="tag">MySQL</span>
      <span class="tag">Python</span>
      <span class="tag">Excel</span>
      <span class="tag">MS Access</span>
      <span class="tag">JMP</span>

      <p><b>AI & Automation</b></p>
      <span class="tag">OpenCV</span>
      <span class="tag">YOLOv5</span>
      <span class="tag">Computer Vision</span>
      <span class="tag">Prompt Engineering</span>
      <span class="tag">AI Solution Design</span>
      <span class="tag">Web App Development</span>
      <span class="tag">Cloud Deployment</span>
    </div>
  `,

  thinking: `
    <div class="box">
      <h2>🧠 How I Solve Problems</h2>

      <p>
        I approach every problem as an end-to-end system—from identifying the challenge to building and deploying a working solution.
      </p>

      <ul>
        <li><b>Identify:</b> Understand operational gaps and inefficiencies</li>
        <li><b>Structure:</b> Break down problems into measurable components</li>
        <li><b>Design:</b> Create process or AI-driven solutions</li>
        <li><b>Build:</b> Translate ideas into working systems or tools</li>
        <li><b>Deploy:</b> Implement in real operational environments</li>
        <li><b>Improve:</b> Continuously refine using feedback and data</li>
      </ul>

      <p>
        This web application itself is an example of this approach—built iteratively using structured thinking and AI-assisted development.
      </p>
    </div>
  `
};

function showSection(key) {
  document.getElementById("content").innerHTML = sections[key];
}

// default view
showSection('about');

</script>

</body>
</html>
