<!DOCTYPE html>
<html>
<head>
  <title>Aastha Mishra</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f7f9fc;
      padding: 40px;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 40px;
      max-width: 900px;
      margin: auto;
    }

    .avatar {
      font-size: 90px;
      background: white;
      padding: 20px;
      border-radius: 50%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .content h1 {
      margin-bottom: 5px;
    }

    .content p {
      color: #555;
      margin-bottom: 20px;
    }

    .about-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .btn {
      padding: 8px 14px;
      background: #e8f0fe;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }

    .btn:hover {
      background: #4285f4;
      color: white;
    }

    .description {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

</head>

<body>

<div class="container">

  <!-- Avatar -->
  <div class="avatar">👩‍🎓</div>

  <!-- Content -->
  <div class="content">
    <h1>Aastha Mishra</h1>
    <p>Industrial Engineer | AI-Driven Operations</p>

    <h2>About Me</h2>

    <div class="about-buttons">
      <div class="btn" onclick="showAbout(0)">Overview</div>
      <div class="btn" onclick="showAbout(1)">What I Do</div>
      <div class="btn" onclick="showAbout(2)">How I Work</div>
      <div class="btn" onclick="showAbout(3)">Focus</div>
    </div>

    <div id="desc" class="description">
      Click a section to learn more.
    </div>
  </div>

</div>

<script>
const aboutData = [
  "Accomplished Industrial Engineer with 5+ years of experience driving operational efficiency and optimizing supply chain processes.",

  "I focus on improving processes, optimizing resources, and reducing operational costs while collaborating across teams to deliver scalable solutions.",

  "My approach is rooted in continuous improvement methodologies such as Kaizen, 5S, DMAIC, and Root Cause Analysis, combined with strong data-driven decision making.",

  "I leverage AI tools and emerging technologies to enhance safety, quality, and performance, with a focus on delivering meaningful and strategic business outcomes."
];

function showAbout(index) {
  document.getElementById("desc").innerText = aboutData[index];
}
</script>

</body>
</html>
